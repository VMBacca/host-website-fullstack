name: CI

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          npm start &
          sleep 5

      - name: Run Cypress tests
        run: npx cypress run
